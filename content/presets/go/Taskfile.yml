version: "3"

# ---------------------------------------------------------------------------
# Go project task automation — preconfigured by `reins init --lang go`.
#
# The `check:all` task is mandatory. AGENTS.md rule V-01 requires the agent
# to run it before every commit.
# ---------------------------------------------------------------------------

tasks:
  check:all:
    desc: "Run all quality gates"
    deps: [format, fix, lint, vet, test:unit]
    cmds:
      - echo "All checks passed!"

  format:
    desc: "Format Go source files"
    cmds:
      - gofmt -w .

  fix:
    desc: "Run Go modernizer (go fix)"
    cmds:
      - go fix ./...

  lint:
    desc: "Run static analysis"
    cmds:
      # Prefer golangci-lint if installed:
      # - golangci-lint run ./...
      - go run honnef.co/go/tools/cmd/staticcheck@latest ./...

  vet:
    desc: "Run go vet"
    cmds:
      - go vet ./...

  test:unit:
    desc: "Run unit tests"
    cmds:
      - go test ./...

  test:race:
    desc: "Run unit tests with race detector"
    cmds:
      - go test -race ./...

  build:
    desc: "Compile the binary"
    cmds:
      - go build ./...

  tidy:
    desc: "Tidy Go modules"
    cmds:
      - go mod tidy

  audit:
    desc: "Check dependencies for known vulnerabilities"
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  clean:
    desc: "Remove build artifacts and test cache"
    cmds:
      - go clean -testcache
