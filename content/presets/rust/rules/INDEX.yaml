# rules/INDEX.yaml — Trigger mapping for the layered rule system
#
# The agent reads this file at the start of every task (METHODOLOGY.md L-01).
#
# Consumption protocol:
#   1. Load all files under `principles:` unconditionally.
#   2. For each file being modified, match its path against `trigger:`
#      globs in `concerns:` and `specifics:`.
#   3. For concerns with `content_pattern:`, scan the target file's
#      content. Load the concern's rules only if the regex matches.
#   4. Load all matched rule files and read them in full before coding.
#
# Conflict resolution: Specifics > Concerns > Principles (most-specific wins).

# ---------------------------------------------------------------------------
# Tier 1: Principles — always loaded, sourced from the reins submodule.
# ---------------------------------------------------------------------------
principles:
  - .reins/rules/principles/quality.md

# ---------------------------------------------------------------------------
# Tier 2: Concerns — cross-cutting rules activated by path + optional
#          content pattern. Add your project's concerns here.
# ---------------------------------------------------------------------------
concerns:
  # Example: prohibit unsafe blocks unless justified
  # - trigger: "**/*.rs"
  #   content_pattern: "unsafe"
  #   rules:
  #     - rules/concerns/minimize-unsafe.md

# ---------------------------------------------------------------------------
# Tier 3: Specifics — domain/technology rules activated by file path.
# ---------------------------------------------------------------------------
specifics:
  - trigger: "**/*.rs"
    rules:
      - rules/specifics/rust.md

  # Axum web framework (activated when file imports axum)
  # - trigger: "**/*.rs"
  #   content_pattern: "axum"
  #   rules:
  #     - rules/specifics/axum.md

  # Tokio async runtime (activated when file imports tokio)
  # - trigger: "**/*.rs"
  #   content_pattern: "tokio"
  #   rules:
  #     - rules/specifics/tokio.md

  # Ratatui TUI framework (activated when file imports ratatui)
  # - trigger: "**/*.rs"
  #   content_pattern: "ratatui"
  #   rules:
  #     - rules/specifics/ratatui.md
