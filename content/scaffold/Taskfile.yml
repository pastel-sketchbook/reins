version: "3"

# ---------------------------------------------------------------------------
# Project task automation — adapt to your language and toolchain.
#
# The `check:all` task is mandatory. AGENTS.md rule V-01 requires the agent
# to run it before every commit. Everything else is project-specific.
# ---------------------------------------------------------------------------

tasks:
