version: "3"

# ---------------------------------------------------------------------------
# Project task automation — adapt to your language and toolchain.
#
# The `check:all` task is mandatory. AGENTS.md rule V-01 requires the agent
# to run it before every commit. Everything else is project-specific.
#
# IMPORTANT: Unconfigured tasks exit 1 on purpose. Replace each placeholder
# with your toolchain's command. Until then, `task check:all` will fail —
# this prevents the agent from committing unchecked code.
# ---------------------------------------------------------------------------

tasks:
  check:all:
    desc: "Run all quality gates"
    deps: [format, fix, lint, test:unit]
    cmds:
      - echo "All checks passed!"

  format:
    desc: "Auto-format source files"
    cmds:
      - echo "ERROR: configure the 'format' task (e.g., gofmt, prettier, rustfmt, black)" && exit 1

  fix:
    desc: "Run language modernizer (e.g., go fix ./...)"
    cmds:
      - echo "ERROR: configure the 'fix' task (e.g., go fix ./...) or remove from check:all deps" && exit 1

  lint:
    desc: "Run static analysis"
    cmds:
      - echo "ERROR: configure the 'lint' task (e.g., golangci-lint, eslint, clippy, ruff)" && exit 1

  test:unit:
    desc: "Run unit tests"
    cmds:
      - echo "ERROR: configure the 'test:unit' task (e.g., go test ./..., jest, cargo test, pytest)" && exit 1

  build:
    desc: "Compile/build the project"
    cmds:
      - echo "ERROR: configure the 'build' task" && exit 1
