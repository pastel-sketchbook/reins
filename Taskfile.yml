version: "3"

vars:
  VERSION:
    sh: cat VERSION 2>/dev/null || echo "dev"
  LDFLAGS: "-s -w -X main.version={{.VERSION}}"
  STATICCHECK_VERSION: "v0.7.0"

tasks:
  build:
    desc: "Build the reins binary"
    cmds:
      - go build -ldflags '{{.LDFLAGS}}' -o reins ./cmd/reins

  install:
    desc: "Install reins to GOPATH/bin"
    cmds:
      - go install -ldflags '{{.LDFLAGS}}' ./cmd/reins

  check:all:
    desc: "Run all quality gates"
    deps: [format, lint, vet, test:unit]
    cmds:
      - echo "All checks passed!"

  format:
    desc: "Format Go source files"
    cmds:
      - gofmt -w .

  lint:
    desc: "Run staticcheck ({{.STATICCHECK_VERSION}})"
    cmds:
      - staticcheck ./...

  vet:
    desc: "Run go vet"
    cmds:
      - go vet ./...

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -f reins

  test:unit:
    desc: "Run unit tests"
    cmds:
      - go test ./...

  version:
    desc: "Print the current version"
    cmds:
      - echo "{{.VERSION}}"
    silent: true

  version:patch:
    desc: "Bump patch version (0.1.0 → 0.1.1)"
    cmds:
      - |
        IFS='.' read -r major minor patch < VERSION
        patch=$((patch + 1))
        echo "${major}.${minor}.${patch}" > VERSION
        cat VERSION
    silent: true

  version:minor:
    desc: "Bump minor version (0.1.0 → 0.2.0)"
    cmds:
      - |
        IFS='.' read -r major minor patch < VERSION
        minor=$((minor + 1))
        echo "${major}.${minor}.0" > VERSION
        cat VERSION
    silent: true

  version:major:
    desc: "Bump major version (0.1.0 → 1.0.0)"
    cmds:
      - |
        IFS='.' read -r major minor patch < VERSION
        major=$((major + 1))
        echo "${major}.0.0" > VERSION
        cat VERSION
    silent: true

  version:tag:
    desc: "Create and push a git tag from VERSION"
    cmds:
      - git tag "v{{.VERSION}}"
      - git push origin "v{{.VERSION}}"
      - echo "Tagged and pushed v{{.VERSION}}"
    preconditions:
      - sh: '[ -n "$(cat VERSION 2>/dev/null)" ]'
        msg: "VERSION file is missing or empty"
      - sh: '! git rev-parse "v{{.VERSION}}" >/dev/null 2>&1'
        msg: "Tag v{{.VERSION}} already exists"

  # ---------------------------------------------------------------------------
  # Distribution — cross-platform binary builds
  # ---------------------------------------------------------------------------

  dist:clean:
    desc: "Remove dist/ directory"
    cmds:
      - rm -rf dist

  dist:build:
    desc: "Cross-compile binaries for all supported platforms"
    deps: [dist:clean]
    vars:
      PLATFORMS: "linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64"
    cmds:
      - |
        for platform in {{.PLATFORMS}}; do
          os="${platform%/*}"
          arch="${platform#*/}"
          output="dist/reins-${os}-${arch}"
          if [ "${os}" = "windows" ]; then
            output="${output}.exe"
          fi
          echo "Building ${os}/${arch}..."
          GOOS="${os}" GOARCH="${arch}" CGO_ENABLED=0 \
            go build -ldflags '{{.LDFLAGS}}' -o "${output}" ./cmd/reins
        done
        echo "All binaries built in dist/"

  dist:package:
    desc: "Create release archives (tar.gz for unix, zip for windows)"
    cmds:
      - |
        for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
          os="${platform%/*}"
          arch="${platform#*/}"
          binary="dist/reins-${os}-${arch}"
          archive="dist/reins-v{{.VERSION}}-${os}-${arch}.tar.gz"
          if [ ! -f "${binary}" ]; then
            echo "SKIP ${binary} (not found)"
            continue
          fi
          tar -czf "${archive}" -C dist "reins-${os}-${arch}"
          echo "Packaged ${archive}"
        done
        for platform in windows/amd64 windows/arm64; do
          os="${platform%/*}"
          arch="${platform#*/}"
          binary="dist/reins-${os}-${arch}.exe"
          archive="dist/reins-v{{.VERSION}}-${os}-${arch}.zip"
          if [ ! -f "${binary}" ]; then
            echo "SKIP ${binary} (not found)"
            continue
          fi
          (cd dist && zip -q "reins-v{{.VERSION}}-${os}-${arch}.zip" "reins-${os}-${arch}.exe")
          echo "Packaged ${archive}"
        done

  dist:checksums:
    desc: "Generate SHA256 checksums for release archives"
    cmds:
      - |
        cd dist
        shasum -a 256 reins-v{{.VERSION}}-*.tar.gz reins-v{{.VERSION}}-*.zip \
          > checksums-v{{.VERSION}}.txt
        echo "Checksums written to dist/checksums-v{{.VERSION}}.txt"
        cat checksums-v{{.VERSION}}.txt

  dist:all:
    desc: "Build, package, and checksum all platforms"
    cmds:
      - task: dist:build
      - task: dist:package
      - task: dist:checksums

  dist:release:
    desc: "Build dist, create GitHub Release, upload all artifacts"
    preconditions:
      - sh: '[ -n "$(cat VERSION 2>/dev/null)" ]'
        msg: "VERSION file is missing or empty"
      - sh: 'git diff --quiet && git diff --cached --quiet'
        msg: "Working tree is dirty — commit or stash changes first"
      - sh: 'command -v gh >/dev/null 2>&1'
        msg: "gh CLI is required (https://cli.github.com)"
    cmds:
      - task: dist:all
      - |
        tag="v{{.VERSION}}"
        if ! git rev-parse "${tag}" >/dev/null 2>&1; then
          git tag "${tag}"
          git push origin "${tag}"
          echo "Created and pushed tag ${tag}"
        else
          echo "Tag ${tag} already exists, skipping tag creation"
        fi
      - |
        tag="v{{.VERSION}}"
        if gh release view "${tag}" >/dev/null 2>&1; then
          echo "Release ${tag} already exists — uploading assets only"
          gh release upload "${tag}" dist/reins-v{{.VERSION}}-*.tar.gz dist/reins-v{{.VERSION}}-*.zip dist/checksums-v{{.VERSION}}.txt --clobber
        else
          gh release create "${tag}" \
            dist/reins-v{{.VERSION}}-*.tar.gz \
            dist/reins-v{{.VERSION}}-*.zip \
            dist/checksums-v{{.VERSION}}.txt \
            --title "reins ${tag}" \
            --notes "Release ${tag}. See install instructions in README.md."
        fi
        echo "Release ${tag} published: https://github.com/pastel-sketchbook/reins/releases/tag/${tag}"
