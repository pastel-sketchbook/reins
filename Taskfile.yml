version: "3"

vars:
  VERSION:
    sh: cat VERSION 2>/dev/null || echo "dev"
  LDFLAGS: "-s -w -X main.version={{.VERSION}}"

tasks:
  build:
    desc: "Build the reins binary"
    cmds:
      - go build -ldflags '{{.LDFLAGS}}' -o reins ./cmd/reins

  install:
    desc: "Install reins to GOPATH/bin"
    cmds:
      - go install -ldflags '{{.LDFLAGS}}' ./cmd/reins

  check:all:
    desc: "Run all quality gates"
    deps: [format, lint, vet, test:unit]
    cmds:
      - echo "All checks passed!"

  format:
    desc: "Format Go source files"
    cmds:
      - gofmt -w .

  lint:
    desc: "Run static analysis"
    cmds:
      - go vet ./...

  vet:
    desc: "Run go vet"
    cmds:
      - go vet ./...

  clean:
    desc: "Remove build artifacts"
    cmds:
      - rm -f reins

  test:unit:
    desc: "Run unit tests"
    cmds:
      - go test ./...
