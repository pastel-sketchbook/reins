# rules/INDEX.yaml — Trigger mapping for the layered rule system
#
# The agent reads this file at the start of every task (AGENTS.md L-01).
#
# Consumption protocol:
#   1. Load all files under `principles:` unconditionally.
#   2. For each file being modified, match its path against `trigger:`
#      globs in `concerns:` and `specifics:`.
#   3. For concerns with `content_pattern:`, scan the target file's
#      content. Load the concern's rules only if the regex matches.
#   4. Load all matched rule files and read them in full before coding.
#
# Conflict resolution: Specifics > Concerns > Principles (most-specific wins).
#
# NOTE: This INDEX.yaml is for the reins framework repo itself.
# Downstream projects get their own INDEX.yaml via `reins init`
# (see content/scaffold/rules/INDEX.yaml).

# ---------------------------------------------------------------------------
# Tier 1: Principles — always loaded, no triggers needed.
# ---------------------------------------------------------------------------
principles:
  - rules/principles/quality.md

# ---------------------------------------------------------------------------
# Tier 2: Concerns — none for the framework repo itself.
# ---------------------------------------------------------------------------
concerns: []

# ---------------------------------------------------------------------------
# Tier 3: Specifics — none for the framework repo itself.
#          Language/framework rule templates live in templates/specifics/.
# ---------------------------------------------------------------------------
specifics: []
